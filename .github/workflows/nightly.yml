name: Nightly build

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/nightly.yml"
      - "MC.Server/**"
      - "compat_mod/**"
      - "patch/**"
      - "scripts/**"
      - "log_configs/**"
      - "build.ps1"
      - "xbox_security.properties"
  workflow_dispatch:

concurrency:
  group: nightly-build
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build and publish nightly
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: "21"

      - name: Clean generated outputs
        shell: powershell
        run: .\scripts\clean.ps1

      - name: Resolve nightly package version
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          [xml]$manifest = Get-Content MC.Server\Package.appxmanifest
          $parts = ([string]$manifest.Package.Identity.Version) -split '\.'
          if ($parts.Count -ne 4) {
            throw "Package.appxmanifest Identity Version must have four numeric fields."
          }

          $base = "$($parts[0]).$($parts[1]).$($parts[2])"
          $revision = 1
          $repo = $env:GITHUB_REPOSITORY
          $apiBase = if ($env:GITHUB_API_URL) { $env:GITHUB_API_URL } else { "https://api.github.com" }
          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          try {
            $release = Invoke-RestMethod -Method Get -Uri "$apiBase/repos/$repo/releases/tags/nightly" -Headers $headers
            if ($release.body -match 'Package version:\s+(\d+)\.(\d+)\.(\d+)\.(\d+)') {
              $previousBase = "$($Matches[1]).$($Matches[2]).$($Matches[3])"
              if ($previousBase -eq $base) {
                $revision = [int]$Matches[4] + 1
              }
            }
          } catch {
            $statusCode = $null
            if ($_.Exception.Response) {
              $statusCode = [int]$_.Exception.Response.StatusCode
            }
            if ($statusCode -ne 404) {
              throw
            }
          }

          if ($revision -gt 65535) {
            throw "Nightly APPX revision exceeded 65535 for base $base."
          }

          $version = "$base.$revision"
          "APPX_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "APPX_FILE=MC.Server_$version.appx" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Nightly APPX version: $version"

      - name: Build APPX
        shell: powershell
        run: .\build.ps1 -AppxVersion $env:APPX_VERSION

      - name: Stage nightly asset
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "out\$env:APPX_FILE" dist\JavaServerUWP-nightly.appx -Force
          $hash = Get-FileHash dist\JavaServerUWP-nightly.appx -Algorithm SHA256
          "$($hash.Hash.ToLowerInvariant())  JavaServerUWP-nightly.appx" | Set-Content -Path dist\JavaServerUWP-nightly.sha256 -Encoding ascii

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: JavaServerUWP-nightly
          path: |
            dist/JavaServerUWP-nightly.appx
            dist/JavaServerUWP-nightly.sha256
          if-no-files-found: error

      - name: Move nightly tag
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f nightly $env:GITHUB_SHA
          git push --force origin refs/tags/nightly

      - name: Publish nightly release
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $repo = $env:GITHUB_REPOSITORY
          $runUrl = "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
          $shortSha = $env:GITHUB_SHA.Substring(0, 7)
          $notes = @"
          Automated nightly build from $shortSha.

          Package version: $env:APPX_VERSION

          Nightly releases are experimental builds for testing current development work.

          Commit: $env:GITHUB_SHA
          Workflow run: $runUrl
          "@

          # gh signals "release missing" with a non-zero exit, which throws under the Actions shell's Stop before the if can branch, so probe under Continue and gate real failures on $LASTEXITCODE
          $exists = $false
          $prev = $ErrorActionPreference
          $ErrorActionPreference = 'Continue'
          gh release view nightly 2>$null | Out-Null
          if ($LASTEXITCODE -eq 0) { $exists = $true }
          $ErrorActionPreference = $prev

          if ($exists) {
            gh release edit nightly --target $env:GITHUB_SHA --title nightly --prerelease --notes $notes
          } else {
            gh release create nightly --target $env:GITHUB_SHA --title nightly --prerelease --notes $notes
          }
          if ($LASTEXITCODE -ne 0) { throw "Failed to create or edit the nightly release" }

          gh release upload nightly dist\JavaServerUWP-nightly.appx dist\JavaServerUWP-nightly.sha256 --clobber
          if ($LASTEXITCODE -ne 0) { throw "Failed to upload nightly assets" }
